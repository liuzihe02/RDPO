### model
model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
trust_remote_code: true

### method

#what kind of training
stage: sft
#true for training, false for eval
do_train: true
do_eval: false
#Fine-tuning method. Optional: freeze, lora, full
finetuning_type: lora
lora_rank: 8
lora_target: all
deepspeed: examples/deepspeed/ds_z3_config.json # choices: [ds_z0_config.json, ds_z2_config.json, ds_z3_config.json]

### dataset
dataset: genrm_sft_no_veri
#Dataset template, please ensure that the dataset template corresponds to the model.
template: qwen
#this can significantly affect cuda memory use
cutoff_len: 1664
# max_samples: 1000
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: output_models/train-qwen2.5-0.5b-genrm-sft-no_veri
logging_steps: 1
save_steps: 200
plot_loss: true
overwrite_output_dir: true
save_only_model: true

### train
per_device_train_batch_size: 6
#stores these gradients instead of immediately updating after every batch
#best to keep the same or increase
gradient_checkpointing: true
gradient_accumulation_steps: 1
learning_rate: 5.0e-5
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
fp16: false
ddp_timeout: 180000000
flash_attn: fa2
