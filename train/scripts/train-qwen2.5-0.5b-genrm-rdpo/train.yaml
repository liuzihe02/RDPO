### model
model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
#qlora
quantization_bit: 4
quantization_method: bitsandbytes # choices: [bitsandbytes (4/8), hqq (2/3/4/5/6/8), eetq (8)]
trust_remote_code: true

### method

#what kind of training
# still provide dpo here even if you use rdpo
stage: dpo
#if you use dpo, need to specify if RDPO or not!
rdpo: true
#true for training, false for eval
do_train: true
do_eval: false
#Fine-tuning method. Optional: freeze, lora, full
finetuning_type: lora
lora_rank: 1
lora_target: all
deepspeed: examples/deepspeed/ds_z2_offload_config.json # choices: [ds_z0_config.json, ds_z2_config.json, ds_z3_config.json]
pref_beta: 0.1
pref_loss: sigmoid # choices: [sigmoid (dpo), orpo, simpo]

#the hyperparam for our RDPO loss
reasoning_weight: 0.6

### dataset

#must exist locally, in the LlamaFactory dataset folder
#remember to use the RDPO dataset format
dataset: genrm_rdpo
#Dataset template, please ensure that the dataset template corresponds to the model.
# though i think this is just to format the dataset questions?
template: qwen
#this can significantly affect cuda memory use; reduce this if memory problems too much
cutoff_len: 512
#subset of entire training set, for experimentation
# only use positive numbers here
# set it to the size of the dataset
max_samples: 100
overwrite_cache: true
preprocessing_num_workers: 16

### output
output_dir: output_models/train-qwen2.5-0.5b-genrm-rdpo
logging_steps: 1
save_steps: 5
plot_loss: true
overwrite_output_dir: true
save_only_model: true

### train
per_device_train_batch_size: 2 #may need to reduce batch size since reasoning adds more data
#stores these gradients instead of immediately updating after every batch
#best to keep the same or increase
gradient_accumulation_steps: 8
learning_rate: 5.0e-6
num_train_epochs: 2.0
lr_scheduler_type: cosine
warmup_ratio: 0.1
bf16: true
ddp_timeout: 180000000
